<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d10;--surface:#13161d;--surface2:#1a1e28;--surface3:#222736;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#e8eaf0;--muted:#7a8299;--dim:#4a5268;
  --red:#ef4444;--orange:#f97316;--yellow:#eab308;--green:#22c55e;--blue:#4f8ef7;
  --red-bg:rgba(239,68,68,.1);--orange-bg:rgba(249,115,22,.1);
  --yellow-bg:rgba(234,179,8,.1);--green-bg:rgba(34,197,94,.1);--blue-bg:rgba(79,142,247,.1);
  --font:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.brand{display:flex;align-items:center;gap:12px}
.brand-icon{font-size:22px;color:var(--blue)}
.brand-title{font-size:16px;font-weight:700;letter-spacing:-.02em}
.brand-sub{font-size:11px;color:var(--muted);margin-top:1px;font-family:var(--mono)}
.header-right{display:flex;align-items:center;gap:16px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--green);font-family:var(--mono)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.stat-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;font-family:var(--mono);color:var(--muted)}
.stat-pill span{color:var(--text);font-weight:600}

/* ── CATEGORY CHIPS ── */
.chips-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.chips-bar::-webkit-scrollbar{display:none}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}

/* ── FILTER BAR ── */
.filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;pointer-events:none}
.search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 30px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--blue)}
select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:12px;outline:none;cursor:pointer}
.filter-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.count-badge{font-size:11px;color:var(--dim);font-family:var(--mono)}

/* ── MAIN ── */
main{max-width:1100px;margin:0 auto;padding:20px 24px 60px}

/* ── SECTION HEADERS ── */
.section-header{display:flex;align-items:center;gap:10px;margin:0 0 12px}
.section-title{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.section-title.action{color:var(--orange)}
.section-title.inform{color:var(--blue)}
.section-count{font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:10px}
.section-count.action{background:var(--orange-bg);color:var(--orange)}
.section-count.inform{background:var(--blue-bg);color:var(--blue)}
.section-divider{height:1px;background:var(--border);margin:24px 0 16px}

/* ── EVENT CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;border-left:4px solid transparent;transition:border-color .15s,box-shadow .15s}
.card:hover{box-shadow:0 4px 24px rgba(0,0,0,.4)}
.card.urgency-immediate{border-left-color:var(--red);background:#120a0a}
.card.urgency-days{border-left-color:var(--orange)}
.card.urgency-weeks{border-left-color:var(--yellow)}
.card.urgency-informational{border-left-color:var(--blue)}

/* Card top row */
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.card-badges{display:flex;flex-wrap:wrap;gap:5px;align-items:center}

/* Urgency badge */
.urgency-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.03em}
.urgency-badge.immediate{background:var(--red-bg);color:var(--red)}
.urgency-badge.days{background:var(--orange-bg);color:var(--orange)}
.urgency-badge.weeks{background:var(--yellow-bg);color:var(--yellow)}
.urgency-badge.informational{background:var(--blue-bg);color:var(--blue)}

/* Action type badge */
.action-badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.04em;background:rgba(255,255,255,.06);color:var(--text);font-family:var(--mono)}

/* Affected users badge */
.users-badge{padding:3px 9px;border-radius:20px;font-size:11px;color:var(--muted);background:var(--surface3)}

/* Card meta right */
.card-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.source-btn{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;text-decoration:none;color:var(--muted);font-size:11px;transition:all .15s}
.source-btn:hover{border-color:var(--blue);color:var(--blue)}
.time-label{font-size:11px;color:var(--dim);font-family:var(--mono);white-space:nowrap}

/* Project row */
.project-row{display:flex;align-items:center;gap:7px;margin-bottom:9px}
.project-logo{width:18px;height:18px;border-radius:4px;object-fit:contain}
.project-name{font-size:13px;font-weight:600;color:var(--muted)}
.project-cat{font-size:10px;padding:1px 7px;border-radius:10px;background:rgba(255,255,255,.05);color:var(--dim)}

/* Card title */
.card-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:7px;letter-spacing:-.01em}
.card-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:12px}

/* Action steps */
.steps-header{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.steps{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.step{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--muted);line-height:1.5}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--surface3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text);flex-shrink:0;margin-top:1px}

/* Deadline */
.deadline{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--red-bg);border:1px solid rgba(239,68,68,.2);border-radius:6px;font-size:12px;color:var(--red);font-family:var(--mono);margin-bottom:12px}

/* Card bottom row */
.card-bottom{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}

/* Validate button */
.validate-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.validate-btn:hover:not(:disabled){background:var(--green-bg);border-color:var(--green);color:var(--green)}
.validate-btn:disabled{opacity:.5;cursor:not-allowed}
.validate-btn.loading{color:var(--blue);border-color:var(--blue);background:var(--blue-bg)}
.validate-btn.done{color:var(--green);border-color:var(--green);background:var(--green-bg)}

/* ── STATES ── */
.empty{text-align:center;padding:60px 24px;color:var(--dim)}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
.loading-state{display:flex;align-items:center;justify-content:center;gap:12px;padding:80px;color:var(--muted)}

/* ── VALIDATE MODAL OVERLAY ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:24px;max-width:440px;width:90%;text-align:center}
.modal-icon{font-size:32px;margin-bottom:12px}
.modal-title{font-size:15px;font-weight:700;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.modal-spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="brand">
    <span class="brand-icon">⬡</span>
    <div>
      <div class="brand-title">Crypto Intelligence</div>
      <div class="brand-sub" id="subtitle">Loading…</div>
    </div>
  </div>
  <div class="header-right">
    <div class="stat-pill">Action Required: <span id="action-count">—</span></div>
    <div class="stat-pill">Total Intel: <span id="total-count">—</span></div>
    <div class="live-badge"><span class="live-dot"></span>Live</div>
  </div>
</header>

<!-- Category chips -->
<div class="chips-bar" id="chips-bar">
  <button class="chip active" data-cat="">All</button>
  <button class="chip" data-cat="Wallet">🔐 Wallets</button>
  <button class="chip" data-cat="Explorer">📊 Explorers</button>
  <button class="chip" data-cat="Dashboard">📈 Dashboards</button>
  <button class="chip" data-cat="DEX">💱 DEX & Trading</button>
  <button class="chip" data-cat="Aggregator">🔀 Aggregators</button>
  <button class="chip" data-cat="Lending">🏦 Lending</button>
  <button class="chip" data-cat="Bridge">🌉 Bridges</button>
  <button class="chip" data-cat="L1">🔗 Layer 1</button>
  <button class="chip" data-cat="L2">⚡ Layer 2</button>
  <button class="chip" data-cat="Oracle">🔮 Oracles</button>
  <button class="chip" data-cat="Stablecoin">💵 Stablecoins</button>
  <button class="chip" data-cat="Infrastructure">🛠 Infrastructure</button>
  <button class="chip" data-cat="Multisig">🛡 Multisig</button>
  <button class="chip" data-cat="Security">🚨 Security</button>
  <button class="chip" data-cat="DeFi">🎯 DeFi</button>
</div>

<!-- Filter bar -->
<div class="filter-bar">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search" type="text" id="search" placeholder="Search intel…" oninput="render()">
  </div>
  <select id="urgency-filter" onchange="render()">
    <option value="">All urgency levels</option>
    <option value="immediate">⚠ Immediate</option>
    <option value="days">📅 Days</option>
    <option value="weeks">🗓 Weeks</option>
    <option value="informational">ℹ Informational</option>
  </select>
  <select id="action-filter" onchange="render()">
    <option value="">All action types</option>
    <option value="update">Update</option>
    <option value="migrate">Migrate</option>
    <option value="withdraw">Withdraw</option>
    <option value="revoke">Revoke approvals</option>
    <option value="rotate_keys">Rotate keys</option>
    <option value="exit">Exit / withdraw</option>
    <option value="claim">Claim</option>
    <option value="vote">Vote</option>
    <option value="monitor">Monitor</option>
  </select>
  <div class="filter-right">
    <span class="count-badge" id="filter-count"></span>
  </div>
</div>

<main id="main">
  <div class="loading-state"><div class="spinner"></div>Loading intelligence…</div>
</main>

<!-- Validate modal -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-icon" id="modal-icon">✉</div>
    <div class="modal-spinner" id="modal-spinner" style="display:none"></div>
    <div class="modal-title" id="modal-title">Generating email…</div>
    <div class="modal-sub" id="modal-sub">Writing hook and formatting intel for distribution</div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────
const SUPABASE_URL      = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
// Note: Groq key is used client-side for email generation (personal tool)
const GROQ_MODEL = 'llama-3.3-70b-versatile';

// Groq key is never stored in code — prompted once per browser session
function getGroqKey() {
  let k = sessionStorage.getItem('groq_k');
  if (!k) {
    k = prompt('Enter your Groq API key to generate the email:\n(Stored in this browser session only — never saved to code or server)');
    if (!k) return null;
    sessionStorage.setItem('groq_k', k.trim());
  }
  return k;
}

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── STATE ──────────────────────────────────────────────────────
let allEvents  = [];
let projectMap = {};
let activeCategory = '';

// ── LABEL MAPS ─────────────────────────────────────────────────
const URGENCY_CONFIG = {
  immediate:     { label:'⚠ IMMEDIATE',  cls:'immediate',     color:'#ef4444' },
  days:          { label:'📅 DAYS',       cls:'days',          color:'#f97316' },
  weeks:         { label:'🗓 WEEKS',      cls:'weeks',         color:'#eab308' },
  informational: { label:'ℹ INFO',        cls:'informational', color:'#4f8ef7' },
};
const ACTION_LABELS = {
  update:'UPDATE', migrate:'MIGRATE', withdraw:'WITHDRAW', revoke:'REVOKE APPROVALS',
  rotate_keys:'ROTATE KEYS', exit:'EXIT NOW', claim:'CLAIM', vote:'VOTE',
  verify:'VERIFY', monitor:'MONITOR', pause_usage:'PAUSE USAGE',
};
const AFFECTED_LABELS = {
  all:'All users', wallet_users:'Wallet users', defi_users:'DeFi users',
  bridge_users:'Bridge users', developers:'Developers',
  stablecoin_holders:'Stablecoin holders', l2_users:'L2 users', nft_users:'NFT users',
};

// ── UTILITIES ──────────────────────────────────────────────────
function timeAgo(d) {
  const diff = Date.now() - new Date(d).getTime();
  const m = Math.floor(diff/60000), h = Math.floor(m/60), days = Math.floor(h/24);
  if(days>0) return days+'d ago';
  if(h>0)    return h+'h ago';
  if(m>0)    return m+'m ago';
  return 'just now';
}
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDeadline(dt) {
  if (!dt) return null;
  const d = new Date(dt);
  const now = Date.now();
  const diff = d.getTime() - now;
  const h = Math.floor(diff/3600000);
  if (h < 0)  return 'DEADLINE PASSED';
  if (h < 24) return `⏰ ${h}h remaining`;
  const days = Math.floor(h/24);
  return `⏰ ${days} days left — ${d.toLocaleDateString()}`;
}

// ── LOAD DATA ──────────────────────────────────────────────────
async function load() {
  const [evRes, prRes] = await Promise.all([
    db.from('events').select('*').order('urgency_rank', {ascending:true})
      .order('detected_at', {ascending:false}).limit(300),
    db.from('projects').select('id,name,category,logo_url,significance_score').eq('is_active',true)
  ]);

  // Fallback if urgency_rank doesn't exist yet — sort manually
  let events = evRes.data || [];
  const urgencyOrder = {immediate:0, days:1, weeks:2, informational:3};
  events.sort((a,b) => {
    const ua = urgencyOrder[a.urgency] ?? 3;
    const ub = urgencyOrder[b.urgency] ?? 3;
    if (ua !== ub) return ua - ub;
    return new Date(b.detected_at).getTime() - new Date(a.detected_at).getTime();
  });

  allEvents = events;
  (prRes.data||[]).forEach(p => projectMap[p.id] = p);

  const actionCount = allEvents.filter(e => e.action_required).length;
  document.getElementById('action-count').textContent = actionCount;
  document.getElementById('total-count').textContent  = allEvents.length;
  document.getElementById('subtitle').textContent =
    `${allEvents.length} intel items · ${Object.keys(projectMap).length} projects monitored`;

  render();
}

// ── FILTER ─────────────────────────────────────────────────────
function getFiltered() {
  const search  = document.getElementById('search').value.toLowerCase();
  const urgency = document.getElementById('urgency-filter').value;
  const action  = document.getElementById('action-filter').value;

  return allEvents.filter(e => {
    const proj = projectMap[e.project_id] || {};
    if (activeCategory && proj.category !== activeCategory) return false;
    if (urgency && e.urgency !== urgency) return false;
    if (action  && e.action_type !== action) return false;
    if (search) {
      const hay = `${e.title} ${e.description} ${proj.name}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

// ── RENDER ─────────────────────────────────────────────────────
function render() {
  const filtered = getFiltered();
  const actionItems = filtered.filter(e => e.action_required && e.urgency !== 'informational');
  const infoItems   = filtered.filter(e => !e.action_required || e.urgency === 'informational');

  document.getElementById('filter-count').textContent = filtered.length + ' items';
  document.getElementById('action-count').textContent = allEvents.filter(e=>e.action_required).length;

  if (!filtered.length) {
    document.getElementById('main').innerHTML = `<div class="empty">No intel matches the current filters.</div>`;
    return;
  }

  let html = '';

  if (actionItems.length) {
    html += `<div class="section-header">
      <span class="section-title action">⚡ Action Required</span>
      <span class="section-count action">${actionItems.length}</span>
    </div>`;
    html += actionItems.map(e => renderCard(e)).join('');
  }

  if (infoItems.length) {
    if (actionItems.length) html += '<div class="section-divider"></div>';
    html += `<div class="section-header">
      <span class="section-title inform">📡 Stay Informed</span>
      <span class="section-count inform">${infoItems.length}</span>
    </div>`;
    html += infoItems.map(e => renderCard(e)).join('');
  }

  document.getElementById('main').innerHTML = html;
}

function renderCard(e) {
  const proj      = projectMap[e.project_id] || {};
  const urgCfg    = URGENCY_CONFIG[e.urgency] || URGENCY_CONFIG.informational;
  const actionLbl = ACTION_LABELS[e.action_type] || (e.action_type||'').toUpperCase();
  const affected  = AFFECTED_LABELS[e.affected_users] || e.affected_users || 'All users';
  const deadline  = formatDeadline(e.action_deadline);
  const steps     = Array.isArray(e.action_steps) ? e.action_steps : [];

  const stepsHtml = steps.length ? `
    <div class="steps-header">What to do</div>
    <div class="steps">
      ${steps.map((s,i) => `<div class="step"><span class="step-num">${i+1}</span><span>${escHtml(s)}</span></div>`).join('')}
    </div>` : '';

  const deadlineHtml = deadline ? `<div class="deadline">${escHtml(deadline)}</div>` : '';

  const logoHtml = proj.logo_url
    ? `<img class="project-logo" src="${escHtml(proj.logo_url)}" alt="${escHtml(proj.name)}" onerror="this.style.display='none'">`
    : '';

  return `
  <div class="card urgency-${urgCfg.cls}">
    <div class="card-top">
      <div class="card-badges">
        <span class="urgency-badge ${urgCfg.cls}">${urgCfg.label}</span>
        ${actionLbl ? `<span class="action-badge">${escHtml(actionLbl)}</span>` : ''}
        ${affected  ? `<span class="users-badge">${escHtml(affected)}</span>` : ''}
      </div>
      <div class="card-meta">
        <a href="${escHtml(e.source_url||'#')}" target="_blank" rel="noopener" class="source-btn">
          ${escHtml(e.source_platform||'Source')} ↗
        </a>
        <span class="time-label">${timeAgo(e.detected_at)}</span>
      </div>
    </div>
    ${proj.name ? `<div class="project-row">${logoHtml}<span class="project-name">${escHtml(proj.name)}</span><span class="project-cat">${escHtml(proj.category||'')}</span></div>` : ''}
    <div class="card-title">${escHtml(e.title)}</div>
    <div class="card-desc">${escHtml(e.description)}</div>
    ${stepsHtml}
    ${deadlineHtml}
    <div class="card-bottom">
      <button class="validate-btn" onclick="handleValidate(this, ${JSON.stringify(JSON.stringify(e)).slice(1,-1)})">
        ✉ Validate &amp; Export Email
      </button>
    </div>
  </div>`;
}

// ── CATEGORY CHIPS ─────────────────────────────────────────────
document.getElementById('chips-bar').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeCategory = chip.dataset.cat || '';
  render();
});

// ── VALIDATE → EMAIL GENERATION ───────────────────────────────
async function handleValidate(btn, eventJson) {
  let event;
  try { event = JSON.parse(eventJson); } catch { return; }

  const proj = projectMap[event.project_id] || {};

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '⟳ Generating…';

  showModal('✉', true, 'Generating your email…', 'Writing a compelling hook and formatting the intel for distribution');

  try {
    const emailData = await generateEmail(event, proj);
    const html      = buildEmailHtml(event, proj, emailData);
    downloadHtml(html, proj.name || 'crypto-intel', event.title);
    hideModal();
    btn.classList.remove('loading');
    btn.classList.add('done');
    btn.textContent = '✓ Email Downloaded';
    setTimeout(() => {
      btn.classList.remove('done');
      btn.disabled = false;
      btn.innerHTML = '✉ Validate &amp; Export Email';
    }, 4000);
  } catch (err) {
    hideModal();
    btn.classList.remove('loading');
    btn.disabled = false;
    btn.innerHTML = '✉ Validate &amp; Export Email';
    alert('Email generation failed: ' + String(err).slice(0,100));
  }
}

async function generateEmail(event, proj) {
  const steps     = Array.isArray(event.action_steps) ? event.action_steps : [];
  const affected  = AFFECTED_LABELS[event.affected_users] || 'users';
  const projName  = proj.name || 'Unknown';
  const projCat   = proj.category || 'Crypto';
  const urgency   = event.urgency || 'informational';
  const actionLbl = ACTION_LABELS[event.action_type] || '';

  const urgContext = {
    immediate: 'This is a critical security situation requiring immediate action. Funds or keys may be at risk.',
    days:      'This requires action within the next few days before a deadline or risk window closes.',
    weeks:     'This is an important update with a planned deadline. Users should act soon.',
    informational: 'This is an important awareness update with no immediate action required.',
  }[urgency] || '';

  const prompt = `You are the official communications director for ${projName}, a ${projCat} project.

Write an official email FROM ${projName} TO their users about this event. Write EXACTLY as ${projName} would — matching their real brand voice, not a generic crypto newsletter.

EVENT:
Title: ${event.title}
Description: ${event.description}
Urgency context: ${urgContext}
Action needed: ${actionLbl || 'None'}
Who is affected: ${affected}
Steps users must take: ${steps.length ? steps.join(' | ') : 'None'}
Deadline: ${event.action_deadline ? new Date(event.action_deadline).toDateString() : 'None'}

STRICT RULES:
- Sound like a real email FROM the ${projName} team, not a third-party alert service
- The subject must be an irresistible hook — specific, urgent, creates instant curiosity or fear of loss. Name exactly what happened and what is at stake. No vague words.
- hook_headline inside the email body — powerful one-liner, max 10 words, reads like a breaking news headline
- opening — 2 sentences, personal and direct, from the team to the user
- body — 2-3 sentences, plain language, what happened and why the user must act now
- action_button_text — 3-5 words, ultra-specific to THIS event and THIS project. Examples: "Update Zcash Wallet Now", "Revoke Uniswap Approvals", "Migrate to Aave V3", "Claim Your ARB Tokens". Never say just "Take Action".
- steps_rewritten — warm, direct, human. Like a friend walking you through it.
- closing — warm sign-off from the team. Personal, not corporate.
- ps — a short punchy P.S. that either adds urgency, a warning, or a reassurance. Always include one.
- team_name — the realistic sender name. E.g. "The MetaMask Security Team", "Zcash Foundation", "Aave Labs", "The Ledger Team"
- security_note — one short sentence reassuring users this is official and what the project will NEVER ask users to do (e.g. "We will never ask for your seed phrase or private keys.")

Respond ONLY with valid JSON, no extra text:
{
  "subject": "...",
  "preview": "...",
  "hook_headline": "...",
  "opening": "...",
  "body": "...",
  "action_button_text": "...",
  "steps_rewritten": ["...", "...", "..."],
  "closing": "...",
  "ps": "...",
  "team_name": "...",
  "security_note": "..."
}`;

  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${getGroqKey()}` },
    body: JSON.stringify({ model:GROQ_MODEL, messages:[{role:'user',content:prompt}], max_tokens:1400, temperature:0.45 }),
  });

  if (!res.ok) throw new Error(`Groq ${res.status}`);
  const data = await res.json();
  const text  = data?.choices?.[0]?.message?.content || '';
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('No JSON in Groq response');
  return JSON.parse(match[0]);
}

function downloadHtml(html, projectName, title) {
  const slug = (projectName+'-'+title).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60);
  const filename = `intel-${slug}.html`;
  const blob = new Blob([html], { type:'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function showModal(icon, loading, title, sub) {
  document.getElementById('modal-icon').textContent    = loading ? '' : icon;
  document.getElementById('modal-icon').style.display  = loading ? 'none' : 'block';
  document.getElementById('modal-spinner').style.display = loading ? 'block' : 'none';
  document.getElementById('modal-title').textContent   = title;
  document.getElementById('modal-sub').textContent     = sub;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function hideModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) hideModal();
});

db.channel('events').on('postgres_changes',
  { event:'INSERT', schema:'public', table:'events' },
  payload => {
    const e = payload.new;
    allEvents.unshift(e);
    const urgOrder = {immediate:0,days:1,weeks:2,informational:3};
    allEvents.sort((a,b) => {
      const ua = urgOrder[a.urgency]??3, ub = urgOrder[b.urgency]??3;
      return ua !== ub ? ua-ub : new Date(b.detected_at)-new Date(a.detected_at);
    });
    document.getElementById('action-count').textContent = allEvents.filter(e=>e.action_required).length;
    document.getElementById('total-count').textContent  = allEvents.length;
    render();
  }
).subscribe();
